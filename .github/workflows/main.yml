name: main.yml

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: mydatabase
        ports:
          - 44322:5432
        options: >-
          --health-cmd "pg_isready -U myuser -d mydatabase"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      zookeeper:
        image: confluentinc/cp-zookeeper:7.5.3
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000
      kafka:
        image: confluentinc/cp-kafka:7.5.3
        ports:
          - 9092:9092
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    env:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:44322/mydatabase
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: 6379
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: prometheus,health,info
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw
      - name: Wait for dependencies
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..40}; do
            (echo > /dev/tcp/localhost/44322) >/dev/null 2>&1 && \
            (echo > /dev/tcp/localhost/6379) >/dev/null 2>&1 && \
            (echo > /dev/tcp/localhost/9092) >/dev/null 2>&1 && break
            echo "Waiting for Postgres/Redis/Kafka... attempt $i"
            sleep 3
          done
      - name: Verify
        run: ./mvnw -B -ntp clean verify
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/*
            **/target/failsafe-reports/*
          if-no-files-found: ignore

  code-quality:
    name: Code Quality
    needs: [build-and-test]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw
      - name: Build for CodeQL
        run: ./mvnw -B -ntp clean compile -DskipTests
      - name: Analyze CodeQL
        uses: github/codeql-action/analyze@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif

  docker-build-and-push:
    name: Docker Build & Push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [code-quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/training-service
    outputs:
      image_ref: ${{ steps.image_ref.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Export image reference
        id: image_ref
        shell: bash
        run: echo "image_ref=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

  deploy-to-staging:
    name: Deploy to Staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [docker-build-and-push]
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: http://staging.train-service.example.com
    steps:
      - name: Deploy staging (placeholder)
        run: |
          echo "Deploying ${{ needs.docker-build-and-push.outputs.image_ref }} to staging"
          echo "Replace this step with real deploy command (ssh/helm/terraform)."

  integration-tests:
    name: Integration Tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [deploy-to-staging]
    runs-on: ubuntu-latest
    steps:
      - name: Run staging smoke tests (placeholder)
        run: |
          echo "Running integration checks against staging URL"
          echo "Replace with k6/newman/curl test suite."

  deploy-to-production:
    name: Deploy to Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [docker-build-and-push]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://train-service.example.com
    steps:
      - name: Deploy production (placeholder)
        run: |
          echo "Deploying ${{ needs.docker-build-and-push.outputs.image_ref }} to production"
          echo "Replace this step with real deploy command guarded by environment approvals."

  notify:
    name: Notify
    if: always()
    needs: [integration-tests, deploy-to-production]
    runs-on: ubuntu-latest
    steps:
      - name: Publish deployment summary
        run: |
          echo "CI/CD pipeline completed."
          echo "Integration tests result: ${{ needs.integration-tests.result }}"
          echo "Production deploy result: ${{ needs.deploy-to-production.result }}"