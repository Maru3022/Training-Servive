apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-k6
  namespace: training
data:
  k6-dashboard.json: |
    {
      "__inputs": [{"name": "DS_PROMETHEUS", "label": "Prometheus", "type": "datasource", "pluginId": "prometheus"}],
      "title": "k6 Load Testing Results",
      "uid": "k6-load-testing",
      "schemaVersion": 36,
      "version": 1,
      "refresh": "5s",
      "time": {"from": "now-30m", "to": "now"},
      "templating": {"list": []},
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Virtual Users (VUs)",
          "gridPos": {"x": 0, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "area"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "blue", "value": null}]}}},
          "targets": [{"expr": "k6_vus", "legendFormat": "VUs", "refId": "A"}]
        },
        {
          "id": 2, "type": "stat", "title": "Requests/s",
          "gridPos": {"x": 4, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "area"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "unit": "reqps", "thresholds": {"steps": [{"color": "green", "value": null}]}}},
          "targets": [{"expr": "rate(k6_http_reqs_total[1m])", "legendFormat": "req/s", "refId": "A"}]
        },
        {
          "id": 3, "type": "stat", "title": "HTTP Failure Rate",
          "gridPos": {"x": 8, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "area"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "unit": "percentunit", "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.01}, {"color": "red", "value": 0.05}]}}},
          "targets": [{"expr": "rate(k6_http_req_failed_total[1m]) / rate(k6_http_reqs_total[1m])", "legendFormat": "failure rate", "refId": "A"}]
        },
        {
          "id": 4, "type": "stat", "title": "p95 Response Time",
          "gridPos": {"x": 12, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "area"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "unit": "ms", "thresholds": {"steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 500}, {"color": "red", "value": 1500}]}}},
          "targets": [{"expr": "k6_http_req_duration_p95 * 1000", "legendFormat": "p95", "refId": "A"}]
        },
        {
          "id": 5, "type": "stat", "title": "Total Requests",
          "gridPos": {"x": 16, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background", "graphMode": "none"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "unit": "short", "thresholds": {"steps": [{"color": "blue", "value": null}]}}},
          "targets": [{"expr": "k6_http_reqs_total", "legendFormat": "total", "refId": "A"}]
        },
        {
          "id": 6, "type": "stat", "title": "Checks Passed",
          "gridPos": {"x": 20, "y": 0, "w": 4, "h": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "unit": "percentunit", "thresholds": {"steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 0.9}, {"color": "green", "value": 0.99}]}}},
          "targets": [{"expr": "rate(k6_checks_total{result='pass'}[1m]) / rate(k6_checks_total[1m])", "legendFormat": "passed", "refId": "A"}]
        },
        {
          "id": 7, "type": "timeseries", "title": "Response Time Percentiles",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "ms", "color": {"mode": "palette-classic"}}},
          "options": {"tooltip": {"mode": "multi"}},
          "targets": [
            {"expr": "k6_http_req_duration_p50 * 1000", "legendFormat": "p50", "refId": "A"},
            {"expr": "k6_http_req_duration_p90 * 1000", "legendFormat": "p90", "refId": "B"},
            {"expr": "k6_http_req_duration_p95 * 1000", "legendFormat": "p95", "refId": "C"},
            {"expr": "k6_http_req_duration_p99 * 1000", "legendFormat": "p99", "refId": "D"}
          ]
        },
        {
          "id": 8, "type": "timeseries", "title": "Requests per Second & VUs",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}}},
          "options": {"tooltip": {"mode": "multi"}},
          "targets": [
            {"expr": "rate(k6_http_reqs_total[1m])", "legendFormat": "req/s", "refId": "A"},
            {"expr": "k6_vus", "legendFormat": "VUs", "refId": "B"}
          ]
        },
        {
          "id": 9, "type": "timeseries", "title": "HTTP Request Duration by Phase",
          "gridPos": {"x": 0, "y": 12, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "ms", "color": {"mode": "palette-classic"}}},
          "targets": [
            {"expr": "k6_http_req_connecting_avg * 1000", "legendFormat": "connecting", "refId": "A"},
            {"expr": "k6_http_req_tls_handshaking_avg * 1000", "legendFormat": "tls_handshaking", "refId": "B"},
            {"expr": "k6_http_req_sending_avg * 1000", "legendFormat": "sending", "refId": "C"},
            {"expr": "k6_http_req_waiting_avg * 1000", "legendFormat": "waiting (TTFB)", "refId": "D"},
            {"expr": "k6_http_req_receiving_avg * 1000", "legendFormat": "receiving", "refId": "E"}
          ]
        },
        {
          "id": 10, "type": "timeseries", "title": "HTTP Errors",
          "gridPos": {"x": 12, "y": 12, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}},
          "targets": [
            {"expr": "rate(k6_http_req_failed_total[1m])", "legendFormat": "failed/s", "refId": "A"},
            {"expr": "rate(k6_http_reqs_total[1m]) - rate(k6_http_req_failed_total[1m])", "legendFormat": "success/s", "refId": "B"}
          ]
        },
        {
          "id": 11, "type": "timeseries", "title": "Spring Boot — HTTP Requests Rate (Actuator)",
          "gridPos": {"x": 0, "y": 20, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "reqps", "color": {"mode": "palette-classic"}}},
          "targets": [
            {"expr": "rate(http_server_requests_seconds_count{job='training-service'}[1m])", "legendFormat": "{{method}} {{uri}} {{status}}", "refId": "A"}
          ]
        },
        {
          "id": 12, "type": "timeseries", "title": "Spring Boot — Response Time p95 (Actuator)",
          "gridPos": {"x": 12, "y": 20, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "ms", "color": {"mode": "palette-classic"}}},
          "targets": [
            {"expr": "histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{job='training-service'}[1m])) * 1000", "legendFormat": "p95 {{uri}}", "refId": "A"}
          ]
        },
        {
          "id": 13, "type": "timeseries", "title": "JVM Heap Memory Used",
          "gridPos": {"x": 0, "y": 28, "w": 8, "h": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "bytes", "color": {"mode": "palette-classic"}}},
          "targets": [
            {"expr": "jvm_memory_used_bytes{job='training-service', area='heap'}", "legendFormat": "{{id}}", "refId": "A"}
          ]
        },
        {
          "id": 14, "type": "timeseries", "title": "JVM CPU Usage",
          "gridPos": {"x": 8, "y": 28, "w": 8, "h": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percentunit", "color": {"mode": "palette-classic"}}},
          "targets": [
            {"expr": "process_cpu_usage{job='training-service'}", "legendFormat": "CPU", "refId": "A"}
          ]
        },
        {
          "id": 15, "type": "timeseries", "title": "Active DB Connections",
          "gridPos": {"x": 16, "y": 28, "w": 8, "h": 6},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}}},
          "targets": [
            {"expr": "hikaricp_connections_active{job='training-service'}", "legendFormat": "active", "refId": "A"},
            {"expr": "hikaricp_connections_pending{job='training-service'}", "legendFormat": "pending", "refId": "B"}
          ]
        }
      ]
    }
